seed: 42
output_dir: outputs

dataset:
  root: data
  noise_std: 25.0
  train_batch_size: 2048
  eval_batch_size: 1024
  num_workers: 4

model:
  num_classes: 10
  base_channels: 64
  task1_ckpt: outputs/checkpoints/task1_best.pt
  task2_ckpt: outputs/checkpoints/task2_best.pt

train:
  epochs: 250
  lr: 0.0005
  momentum: 0.9
  weight_decay: 0.0001
  lambda_denoise: 1.0
  lambda_cls: 1.0
  lambda_consistency: 0.2

  grad_clip: 1.0

scheduler:
  step_size: 8
  gamma: 0.5
