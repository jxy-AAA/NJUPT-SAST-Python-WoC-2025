seed: 42
output_dir: outputs

dataset:
  root: data
  noise_std: 25.0
  train_batch_size: 1024
  eval_batch_size: 512
  num_workers: 4

model:
  in_channels: 3
  features: 64
  depth: 6

train:
  epochs: 300
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0001
  grad_clip: 1.0

scheduler:
  step_size: 20
  gamma: 0.5
