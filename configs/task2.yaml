seed: 42
output_dir: outputs

dataset:
  root: data
  train_batch_size: 1024
  eval_batch_size: 256
  num_workers: 4

model:
  num_classes: 10
  base_channels: 64

train:
  epochs: 300
  lr: 0.001
  weight_decay: 0.0005
  label_smoothing: 0.0
  grad_clip: 1.0

scheduler:
  step_size: 15
  gamma: 0.5
